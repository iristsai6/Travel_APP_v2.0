<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Web App - 企業級智慧旅團系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // 配置 Tailwind 支援 Dark Mode 與 Glassmorphism 擴充
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        appleGray: '#f5f5f7',
                        appleDark: '#1d1d1f'
                    },
                    backdropBlur: {
                        xs: '2px'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
    </head>
<body class="bg-slate-50 text-slate-900 dark:bg-zinc-950 dark:text-zinc-50 min-h-screen font-sans antialiased transition-colors duration-300">

    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
        <div class="absolute -top-40 -left-40 w-96 h-96 bg-purple-500/10 rounded-full blur-3xl dark:bg-purple-500/5"></div>
        <div class="absolute top-1/3 -right-40 w-96 h-96 bg-blue-500/10 rounded-full blur-3xl dark:bg-blue-500/5"></div>
    </div>

    <div class="relative z-10 flex min-h-screen flex-col lg:flex-row">
        
        <aside id="app-sidebar" class="hidden lg:flex flex-col w-64 bg-white/70 dark:bg-zinc-900/70 backdrop-blur-md border-r border-slate-200/50 dark:border-zinc-800/50 p-4 shrink-0 transition-all duration-300">
            <div class="mb-8 p-3 bg-slate-100/50 dark:bg-zinc-800/50 rounded-2xl border border-slate-200/30 dark:border-zinc-700/30">
                <h1 class="text-xl font-bold bg-gradient-to-r from-orange-500 via-pink-500 to-purple-600 bg-clip-text text-transparent">TravelApp</h1>
                <p id="sidebar-group-name" class="text-xs text-slate-500 dark:text-zinc-400 mt-1 truncate">未選擇旅團</p>
            </div>
            <nav class="flex-1 space-y-2">
                <a href="#home" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-100 dark:hover:bg-zinc-800">
                    <span class="text-sm font-medium">旅團大廳</span>
                </a>
                <a href="#itinerary" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-100 dark:hover:bg-zinc-800">
                    <span class="text-sm font-medium">行程規劃</span>
                </a>
                <a href="#finance" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-100 dark:hover:bg-zinc-800">
                    <span class="text-sm font-medium">財務分帳</span>
                </a>
                <a href="#map" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-100 dark:hover:bg-zinc-800">
                    <span class="text-sm font-medium">地圖導航</span>
                </a>
                <a href="#about" class="flex items-center space-x-3 px-4 py-3 rounded-xl transition-all duration-200 hover:bg-slate-100 dark:hover:bg-zinc-800">
                    <span class="text-sm font-medium">個人資料</span>
                </a>
            </nav>
            <div id="sidebar-user-info" class="border-t border-slate-200/50 dark:border-zinc-800/50 pt-4 flex items-center space-x-3">
                <div class="w-10 h-10 rounded-full bg-slate-300 dark:bg-zinc-700 animate-pulse" id="sidebar-avatar-container"></div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold truncate" id="sidebar-username">載入中...</p>
                </div>
            </nav>
        </aside>

        <nav id="app-mobile-nav" class="lg:hidden fixed bottom-0 left-0 right-0 h-16 bg-white/80 dark:bg-zinc-900/80 backdrop-blur-lg border-t border-slate-200/50 dark:border-zinc-800/50 flex justify-around items-center z-50 px-2 pb-safe">
            <a href="#home" class="flex flex-col items-center justify-center text-xs font-medium w-12 py-1">
                <span>大廳</span>
            </a>
            <a href="#itinerary" class="flex flex-col items-center justify-center text-xs font-medium w-12 py-1">
                <span>行程</span>
            </a>
            <a href="#finance" class="flex flex-col items-center justify-center text-xs font-medium w-12 py-1">
                <span>財務</span>
            </a>
            <a href="#map" class="flex flex-col items-center justify-center text-xs font-medium w-12 py-1">
                <span>地圖</span>
            </a>
            <a href="#about" class="flex flex-col items-center justify-center text-xs font-medium w-12 py-1">
                <span>我的</span>
            </a>
        </nav>

        <main class="flex-1 flex flex-col min-w-0 pb-16 lg:pb-0">
            <header class="h-16 border-b border-slate-200/30 dark:border-zinc-800/30 px-6 flex items-center justify-between bg-white/30 dark:bg-zinc-950/30 backdrop-blur-sm sticky top-0 z-40">
                <div id="header-breadcrumb" class="text-sm font-semibold tracking-wide">首頁</div>
                <div class="flex items-center space-x-4">
                    <div id="header-countdown-badge" class="text-xs font-bold px-3 py-1.5 rounded-full bg-orange-500/10 text-orange-600 dark:text-orange-400 hidden">
                        載入中...
                    </div>
                    <button id="theme-toggle-btn" class="p-2 rounded-xl hover:bg-slate-100 dark:hover:bg-zinc-800 transition-colors" aria-label="切換深淺模式">
                        <span class="dark:hidden">🌙</span>
                        <span class="hidden dark:inline">☀️</span>
                    </</button>
                </div>
            </header>

            <div id="app-route-view" class="flex-1 p-4 md:p-6 lg:p-8 overflow-y-auto">
                </div>
        </main>
    </div>

    <div id="toast-container" class="fixed top-6 right-6 z-[100] flex flex-col space-y-3 max-w-sm w-full pointer-events-none"></div>

    <div id="global-modal-root" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-zinc-950/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300">
        <div id="global-modal-content" class="bg-white dark:bg-zinc-900 w-full max-w-md rounded-3xl p-6 shadow-2xl border border-slate-200/50 dark:border-zinc-800/50 transform scale-95 transition-transform duration-300">
            </div>
    </div>

    <div id="global-loading-overlay" class="fixed inset-0 z-[110] bg-zinc-950/60 backdrop-blur-xs flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200">
        <div class="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-sm font-medium text-white tracking-wider" id="global-loading-text">請稍候...</p>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
